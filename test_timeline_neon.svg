<svg xmlns="http://www.w3.org/2000/svg" width="600" height="720">
  <defs>
    <!-- 霓虹发光 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 纯黑背景 -->
  <rect width="600" height="720" fill="#0a0a0a"/>
  
  <!-- 网格线（赛博朋克风格） -->
  <g stroke="#1a1a2e" stroke-width="1">
    <line x1="0" y1="0" x2="600" y2="0"/>
    <line x1="0" y1="20" x2="600" y2="20"/>
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="140" x2="600" y2="140"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="220" x2="600" y2="220"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="260" x2="600" y2="260"/>
    <line x1="0" y1="280" x2="600" y2="280"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="340" x2="600" y2="340"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="0" y1="380" x2="600" y2="380"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="420" x2="600" y2="420"/>
    <line x1="0" y1="440" x2="600" y2="440"/>
    <line x1="0" y1="460" x2="600" y2="460"/>
    <line x1="0" y1="480" x2="600" y2="480"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="520" x2="600" y2="520"/>
    <line x1="0" y1="540" x2="600" y2="540"/>
    <line x1="0" y1="560" x2="600" y2="560"/>
    <line x1="0" y1="580" x2="600" y2="580"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="620" x2="600" y2="620"/>
    <line x1="0" y1="640" x2="600" y2="640"/>
    <line x1="0" y1="660" x2="600" y2="660"/>
    <line x1="0" y1="680" x2="600" y2="680"/>
    <line x1="0" y1="700" x2="600" y2="700"/>
  </g>
  
  <!-- 标题 -->
  <text x="300" y="45" text-anchor="middle" fill="#00ffff" font-family="Courier New" font-size="28" font-weight="bold" filter="url(#textGlow)">
    2026-02-07
  </text>
  <text x="300" y="70" text-anchor="middle" fill="#ff00ff" font-family="Courier New" font-size="12" letter-spacing="8" filter="url(#textGlow)">
    TIMELINE
  </text>

  <!-- 时间轴主线 -->
  <line x1="80" y1="90" x2="80" y2="690" 
        stroke="#00ffff" stroke-width="2" filter="url(#neonGlow)"/>
  <text x="70" y="95" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">08:00</text>
  <line x1="75" y1="90" x2="85" y2="90" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="145" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">09:00</text>
  <line x1="75" y1="140" x2="85" y2="140" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="195" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">10:00</text>
  <line x1="75" y1="190" x2="85" y2="190" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="245" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">11:00</text>
  <line x1="75" y1="240" x2="85" y2="240" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="295" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">12:00</text>
  <line x1="75" y1="290" x2="85" y2="290" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="345" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">13:00</text>
  <line x1="75" y1="340" x2="85" y2="340" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="395" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">14:00</text>
  <line x1="75" y1="390" x2="85" y2="390" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="445" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">15:00</text>
  <line x1="75" y1="440" x2="85" y2="440" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="495" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">16:00</text>
  <line x1="75" y1="490" x2="85" y2="490" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="545" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">17:00</text>
  <line x1="75" y1="540" x2="85" y2="540" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="595" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">18:00</text>
  <line x1="75" y1="590" x2="85" y2="590" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="645" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">19:00</text>
  <line x1="75" y1="640" x2="85" y2="640" stroke="#00ffff" stroke-width="2"/>
  <text x="70" y="695" text-anchor="end" fill="#666" font-family="Courier New" font-size="11">20:00</text>
  <line x1="75" y1="690" x2="85" y2="690" stroke="#00ffff" stroke-width="2"/>

  <!-- 改代码 -->
  <rect x="100" y="140.0" width="420" height="75.0" 
        fill="none" stroke="#00ffff" stroke-width="2" rx="0" filter="url(#neonGlow)"/>
  <rect x="100" y="140.0" width="420" height="75.0" 
        fill="#00ffff" opacity="0.1"/>
  <text x="115" y="182.5" fill="#00ffff" font-family="Courier New" font-size="14" font-weight="bold">
    改代码
  </text>
  <text x="510" y="182.5" text-anchor="end" fill="#fff" font-family="Courier New" font-size="11">
    09:00-10:30
  </text>
  <circle cx="80" cy="177.5" r="6" fill="#00ffff" filter="url(#neonGlow)"/>

  <!-- 开会讨论 -->
  <rect x="100" y="215.0" width="420" height="50.0" 
        fill="none" stroke="#ff00ff" stroke-width="2" rx="0" filter="url(#neonGlow)"/>
  <rect x="100" y="215.0" width="420" height="50.0" 
        fill="#ff00ff" opacity="0.1"/>
  <text x="115" y="245.0" fill="#ff00ff" font-family="Courier New" font-size="14" font-weight="bold">
    开会讨论
  </text>
  <text x="510" y="245.0" text-anchor="end" fill="#fff" font-family="Courier New" font-size="11">
    10:30-11:30
  </text>
  <circle cx="80" cy="240.0" r="6" fill="#ff00ff" filter="url(#neonGlow)"/>

  <!-- 午餐休息 -->
  <rect x="100" y="290.0" width="420" height="50.0" 
        fill="none" stroke="#ffff00" stroke-width="2" rx="0" filter="url(#neonGlow)"/>
  <rect x="100" y="290.0" width="420" height="50.0" 
        fill="#ffff00" opacity="0.1"/>
  <text x="115" y="320.0" fill="#ffff00" font-family="Courier New" font-size="14" font-weight="bold">
    午餐休息
  </text>
  <text x="510" y="320.0" text-anchor="end" fill="#fff" font-family="Courier New" font-size="11">
    12:00-13:00
  </text>
  <circle cx="80" cy="315.0" r="6" fill="#ffff00" filter="url(#neonGlow)"/>

  <!-- 写文档 -->
  <rect x="100" y="390.0" width="420" height="100.0" 
        fill="none" stroke="#00ff00" stroke-width="2" rx="0" filter="url(#neonGlow)"/>
  <rect x="100" y="390.0" width="420" height="100.0" 
        fill="#00ff00" opacity="0.1"/>
  <text x="115" y="445.0" fill="#00ff00" font-family="Courier New" font-size="14" font-weight="bold">
    写文档
  </text>
  <text x="510" y="445.0" text-anchor="end" fill="#fff" font-family="Courier New" font-size="11">
    14:00-16:00
  </text>
  <circle cx="80" cy="440.0" r="6" fill="#00ff00" filter="url(#neonGlow)"/>

  <!-- Code Review -->
  <rect x="100" y="515.0" width="420" height="50.0" 
        fill="none" stroke="#ff6600" stroke-width="2" rx="0" filter="url(#neonGlow)"/>
  <rect x="100" y="515.0" width="420" height="50.0" 
        fill="#ff6600" opacity="0.1"/>
  <text x="115" y="545.0" fill="#ff6600" font-family="Courier New" font-size="14" font-weight="bold">
    Code Review
  </text>
  <text x="510" y="545.0" text-anchor="end" fill="#fff" font-family="Courier New" font-size="11">
    16:30-17:30
  </text>
  <circle cx="80" cy="540.0" r="6" fill="#ff6600" filter="url(#neonGlow)"/>
</svg>