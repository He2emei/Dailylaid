<svg xmlns="http://www.w3.org/2000/svg" width="500" height="595">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- 毛玻璃效果 -->
    <filter id="glass" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0"/>
    </filter>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 装饰圆圈 -->
    <radialGradient id="blob1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#0f4c75;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0f4c75;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="500" height="595" fill="url(#bgGrad)"/>
  
  <!-- 装饰光斑 -->
  <circle cx="400" cy="100" r="150" fill="url(#blob1)"/>
  <circle cx="50" cy="300" r="120" fill="url(#blob2)"/>
  
  <!-- 标题 -->
  <text x="250" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="22" font-weight="600">
    2026-02-07
  </text>
  <text x="250" y="68" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Arial" font-size="12">
    TIME LOG
  </text>

  <!-- 卡片 1 -->
  <rect x="30" y="90" width="440" height="80" rx="16" 
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- 时间指示器 -->
  <circle cx="55" cy="130" r="8" fill="#e94560" filter="url(#glow)"/>
  <circle cx="55" cy="130" r="4" fill="white"/>
  
  <!-- 活动名称 -->
  <text x="80" y="122" fill="white" font-family="Arial" font-size="16" font-weight="500">
    改代码
  </text>
  
  <!-- 时间区间 -->
  <text x="80" y="145" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="13">
    09:00 → 10:30
  </text>
  
  <!-- 时长 -->
  <text x="450" y="135" text-anchor="end" fill="#e94560" font-family="Arial" font-size="12" font-weight="600">
    1h 30m
  </text>

  <!-- 卡片 2 -->
  <rect x="30" y="185" width="440" height="80" rx="16" 
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- 时间指示器 -->
  <circle cx="55" cy="225" r="8" fill="#00d9ff" filter="url(#glow)"/>
  <circle cx="55" cy="225" r="4" fill="white"/>
  
  <!-- 活动名称 -->
  <text x="80" y="217" fill="white" font-family="Arial" font-size="16" font-weight="500">
    开会讨论
  </text>
  
  <!-- 时间区间 -->
  <text x="80" y="240" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="13">
    10:30 → 11:30
  </text>
  
  <!-- 时长 -->
  <text x="450" y="230" text-anchor="end" fill="#00d9ff" font-family="Arial" font-size="12" font-weight="600">
    1h
  </text>

  <!-- 卡片 3 -->
  <rect x="30" y="280" width="440" height="80" rx="16" 
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- 时间指示器 -->
  <circle cx="55" cy="320" r="8" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="55" cy="320" r="4" fill="white"/>
  
  <!-- 活动名称 -->
  <text x="80" y="312" fill="white" font-family="Arial" font-size="16" font-weight="500">
    午餐休息
  </text>
  
  <!-- 时间区间 -->
  <text x="80" y="335" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="13">
    12:00 → 13:00
  </text>
  
  <!-- 时长 -->
  <text x="450" y="325" text-anchor="end" fill="#ffd700" font-family="Arial" font-size="12" font-weight="600">
    1h
  </text>

  <!-- 卡片 4 -->
  <rect x="30" y="375" width="440" height="80" rx="16" 
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- 时间指示器 -->
  <circle cx="55" cy="415" r="8" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="55" cy="415" r="4" fill="white"/>
  
  <!-- 活动名称 -->
  <text x="80" y="407" fill="white" font-family="Arial" font-size="16" font-weight="500">
    写文档
  </text>
  
  <!-- 时间区间 -->
  <text x="80" y="430" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="13">
    14:00 → 16:00
  </text>
  
  <!-- 时长 -->
  <text x="450" y="420" text-anchor="end" fill="#00ff88" font-family="Arial" font-size="12" font-weight="600">
    2h
  </text>

  <!-- 卡片 5 -->
  <rect x="30" y="470" width="440" height="80" rx="16" 
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- 时间指示器 -->
  <circle cx="55" cy="510" r="8" fill="#ff6b6b" filter="url(#glow)"/>
  <circle cx="55" cy="510" r="4" fill="white"/>
  
  <!-- 活动名称 -->
  <text x="80" y="502" fill="white" font-family="Arial" font-size="16" font-weight="500">
    Code Review
  </text>
  
  <!-- 时间区间 -->
  <text x="80" y="525" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="13">
    16:30 → 17:30
  </text>
  
  <!-- 时长 -->
  <text x="450" y="515" text-anchor="end" fill="#ff6b6b" font-family="Arial" font-size="12" font-weight="600">
    1h
  </text>
</svg>